# FractalChain devnet nginx proxy.
#
# Install on the remote chain server when only port 80 is public:
#   sudo mkdir -p /opt/fractal-explorer
#   sudo cp -R tools/explorer/index.html tools/explorer/app.js tools/explorer/assets /opt/fractal-explorer/
#   sudo cp tools/explorer/nginx-fractalchain-devnet.conf /etc/nginx/sites-available/fractalchain-devnet
#   sudo ln -sf /etc/nginx/sites-available/fractalchain-devnet /etc/nginx/sites-enabled/fractalchain-devnet
#   sudo nginx -t && sudo systemctl reload nginx
#
# Assumes the base Docker compose is running with:
#   node   -> 127.0.0.1:18545
#   faucet -> 127.0.0.1:18088
#
# Public endpoints:
#   POST http://<server>/rpc  -> JSON-RPC
#   POST http://<server>/fund -> faucet POST /fund {"address":"0x..."}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location = /health {
        add_header Content-Type application/json;
        return 200 '{"ok":true,"service":"fractalchain-devnet-proxy"}';
    }

    location = /rpc {
        proxy_pass http://127.0.0.1:18545;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /fund {
        proxy_pass http://127.0.0.1:18088/fund;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /opt/fractal-explorer;
        try_files $uri $uri/ /index.html;
    }
}
