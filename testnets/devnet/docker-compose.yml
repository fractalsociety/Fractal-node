# PRD §18 M6 — local devnet (JSON-RPC + optional faucet).
# Build from repository root context is not used here; compose build context is `../..`.
services:
  node:
    build:
      context: ../..
      dockerfile: testnets/devnet/Dockerfile
    ports:
      - "127.0.0.1:18545:8545"
      - "9010:9010/udp"
    environment:
      FRACTAL_RPC_ADDR: "0.0.0.0:8545"
      FRACTAL_P2P_LISTEN: "/ip4/0.0.0.0/udp/9010/quic-v1"
      FRACTAL_P2P_IDENTITY_PATH: "/data/p2p.key"
    volumes:
      - node-data:/data
    networks:
      default:
        aliases:
          # Stable RPC hostname for ecosystem services (Fractalwork/DataEvol):
          #   FRACTAL_CHAIN_RPC_URL=http://fractalchain-node:8545
          - fractalchain-node
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf -X POST -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"eth_blockNumber\",\"params\":[]}' http://127.0.0.1:8545 | grep -q result",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  faucet:
    build:
      context: ../..
      dockerfile: testnets/devnet/Dockerfile.faucet
    ports:
      - "127.0.0.1:18088:8088"
    environment:
      FRACTAL_RPC_URL: "http://node:8545"
      FAUCET_BIND: "0.0.0.0:8088"
    depends_on:
      - node

  node1:
    profiles: ["multi"]
    build:
      context: ../..
      dockerfile: testnets/devnet/Dockerfile
    ports:
      - "8546:8545"
      - "9011:9010/udp"
    environment:
      FRACTAL_RPC_ADDR: "0.0.0.0:8545"
      FRACTAL_P2P_LISTEN: "/ip4/0.0.0.0/udp/9010/quic-v1"
      FRACTAL_P2P_IDENTITY_PATH: "/data/p2p.key"
      FRACTAL_SHARD_ID: "1"
      FRACTAL_SHARD_COUNT: "3"
    volumes:
      - node1-data:/data

  node2:
    profiles: ["multi"]
    build:
      context: ../..
      dockerfile: testnets/devnet/Dockerfile
    ports:
      - "8547:8545"
      - "9012:9010/udp"
    environment:
      FRACTAL_RPC_ADDR: "0.0.0.0:8545"
      FRACTAL_P2P_LISTEN: "/ip4/0.0.0.0/udp/9010/quic-v1"
      FRACTAL_P2P_IDENTITY_PATH: "/data/p2p.key"
      FRACTAL_SHARD_ID: "2"
      FRACTAL_SHARD_COUNT: "3"
    volumes:
      - node2-data:/data

volumes:
  node-data:
  node1-data:
  node2-data:
