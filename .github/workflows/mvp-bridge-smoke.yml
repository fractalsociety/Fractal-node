# PRD §18 M5 - >=100 synthetic receipts settle + claim against JSON-RPC.
name: mvp-bridge-smoke

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: mvp-bridge-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mvp-bridge-100:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FRACTAL_RPC_URL: http://127.0.0.1:8545
      MVP_RECEIPT_COUNT: "100"
      RPC_WAIT_SECS: "240"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Start devnet node (Docker)
        run: docker compose -f testnets/devnet/docker-compose.yml up -d --build node

      - name: MVP bridge smoke (wait + 100 claims)
        run: ./scripts/run-mvp-bridge-smoke.sh

      - name: Compose logs
        if: always()
        run: docker compose -f testnets/devnet/docker-compose.yml logs --no-color > mvp-bridge-compose.log || true

      - name: Upload compose logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mvp-bridge-compose-log
          path: mvp-bridge-compose.log
          if-no-files-found: ignore
          retention-days: 14
